<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pilih Lagu</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  background: radial-gradient(circle at center, #2a0a3d, #0a0615);
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.2;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 2;
  padding-top: 80px;
}

.badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  padding: 6px 15px;
  border-radius: 20px;
  font-size: 14px;
}

h1 {
  font-size: 40px;
  margin: 10px 0;
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: rgba(255,255,255,0.7);
  margin-bottom: 50px;
}

.music-container {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  width: 220px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.cover {
  width: 100%;
  height: 140px;
  border-radius: 15px;
  margin-bottom: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
}

.cover1 { background: linear-gradient(135deg, #ff6ec4, #ff3cac); }
.cover2 { background: linear-gradient(135deg, #7873f5, #ff6ec4); }
.cover3 { background: linear-gradient(135deg, #ff4e50, #f00000); }

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: white;
  cursor: pointer;
}

.active {
  box-shadow: 0 0 25px #ff6ec4;
}
</style>
</head>

<body>

<div class="container">

  <div class="badge">🎵 Our Playlist</div>
  <h1>Pilih Lagu 🎶</h1>
  <div class="subtitle">Semua Lagu Romantis Cocok Buat Kamu</div>

  <div class="music-container">

    <div class="card" onclick="playSong('perfect')">
      <div class="cover cover1">❤️</div>
      <h3>Perfect</h3>
      <p>Ed Sheeran</p>
      <button id="btn-perfect">▶ Play Song</button>
    </div>

    <div class="card" onclick="playSong('ilysb')">
      <div class="cover cover2">❤️</div>
      <h3>ILYSB</h3>
      <p>LANY</p>
      <button id="btn-ilysb">▶ Play Song</button>
    </div>

    <div class="card" onclick="playSong('iniabadi')">
      <div class="cover cover3">❤️</div>
      <h3>Ini Abadi</h3>
      <p>Perunggu</p>
      <button id="btn-iniabadi">▶ Play Song</button>
    </div>

  </div>

</div>

<!-- AUDIO (INI KUNCI UTAMA 🔥) -->
<audio id="audio-perfect" src="music/perfect.mp3"></audio>
<audio id="audio-ilysb" src="music/ilysb.mp3"></audio>
<audio id="audio-iniabadi" src="music/iniabadi.mp3"></audio>

<script>
let songs = {
  perfect: document.getElementById("audio-perfect"),
  ilysb: document.getElementById("audio-ilysb"),
  iniabadi: document.getElementById("audio-iniabadi")
};

function playSong(name) {

  // stop semua
  for (let key in songs) {
    songs[key].pause();
    songs[key].currentTime = 0;

    document.getElementById("btn-" + key).innerText = "▶ Play Song";
    document.getElementById("btn-" + key).parentElement.classList.remove("active");
  }

  // play lagu
  songs[name].play();

  document.getElementById("btn-" + name).innerText = "⏸ Playing...";
  document.getElementById("btn-" + name).parentElement.classList.add("active");
}
</script>

</body>
</html>
